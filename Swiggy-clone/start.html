<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swiggy Login</title>
<link rel="stylesheet" href="start.css">
<link rel="icon" href="images/swiggy.png" type="image/png">
</head>

<body>

<div class="container">
    
    <div class="left">
        <img src="images/swiggy-logo.png" alt="">
<p>Order delicious food from your favourite restaurants anytime anywhere </p>
    </div>

    <div class="right">
        <div class="form-box signin-form">
            <h2>Sign In</h2>
            <p>Welcome back food lover </p>

            <div class="input-box">
                <input type="email" id="loginEmail" placeholder="Enter your email">
            </div>

            <div class="input-box">
                <input type="password" id="loginPassword" placeholder="Enter your password">
            </div>

            <button class="btn" onclick="login()">
                Sign In
            </button>

            <div class="switch">
                Don't have an account?
                <span id="showSignup">Sign Up</span>
            </div>

        </div>

        <div class="form-box signup-form">
            <h2>Create Account</h2>
            <p>Join Swiggy today </p>

            <div class="input-box">
                <input type="text" id="signupName" placeholder="Full Name">
            </div>

            <div class="input-box">
                <input type="email" id="signupEmail" placeholder="Email Address">
            </div>

            <div class="input-box">
                <input type="password" id="signupPassword" placeholder="Create Password">
            </div>

            <button class="btn" onclick="signup()">
                Sign Up
            </button>

            <div class="switch">
                Already have an account?
                <span id="showSignin">Sign In</span>
            </div>
        </div>
    </div>
</div>

<div class="signup-popup" id="signupPopup">
    <div class="signup-popup-box">
        <h2>Signup Successful</h2>
        <p>Your account has been created</p>
        <button onclick="closeSignupPopup()">
            Continue
        </button>
    </div>
</div>

<div class="login-popup" id="loginPopup">
    <div class="login-popup-box">
        <h2>Login Failed</h2>
        <p>Wrong email or password</p>
        <button onclick="closeLoginPopup()">
            Try Again
        </button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
